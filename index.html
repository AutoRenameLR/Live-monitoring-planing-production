<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SL1 MONITOR</title>
    
    <!-- 1. Library Tailwind CSS yang BENAR -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 2. Google Fonts yang BENAR -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com" rel="stylesheet">
    
    <!-- 3. CSS Style yang dibungkus tag <style> -->
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
        }
        @keyframes spin-slow { 
            from { transform: rotate(0deg); } 
            to { transform: rotate(360deg); } 
        }
        .refreshing { 
            animation: spin-slow 1s linear infinite; 
        }
    </style>
</head>

<body class="bg-slate-50 text-slate-900 min-h-screen">

    <header class="bg-slate-900 text-white p-4 sticky top-0 z-30 shadow-xl border-b border-white/5">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <div class="p-2 bg-indigo-600 rounded-xl shadow-lg shadow-indigo-500/20">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><ellipse cx="12" cy="5" rx="9" ry="3"></ellipse><path d="M3 5V19A9 3 0 0 0 21 19V5"></path><path d="M3 12A9 3 0 0 0 21 12"></path></svg>
                </div>
                <div>
                    <h1 class="text-lg font-black tracking-tight leading-none uppercase italic">SL1 MONITOR</h1>
                    <p id="sync-status" class="text-[10px] text-slate-400 font-bold tracking-widest mt-1 uppercase">SINKRONISASI DATABASE...</p>
                </div>
            </div>
            <button onclick="fetchData()" id="refresh-btn" class="flex items-center bg-slate-800 hover:bg-indigo-600 px-4 py-2 rounded-xl text-[11px] font-black transition-all border border-slate-700">
                <svg id="refresh-icon" class="mr-2" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"></path><path d="M21 3v5h-5"></path></svg>
                <span id="btn-text">REFRESH DATA</span>
            </button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-4 md:p-6">
        <!-- Metrik Kotak -->
        <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
            <div class="bg-white p-6 rounded-[2.5rem] border shadow-sm">
                <div class="text-[10px] font-black text-slate-400 uppercase mb-1">Total Plan</div>
                <div id="metric-total" class="text-3xl font-black text-slate-800">0</div>
            </div>
            <div class="bg-white p-6 rounded-[2.5rem] border shadow-sm text-amber-500">
                <div class="text-[10px] font-black text-slate-400 uppercase mb-1">Waiting</div>
                <div id="metric-wait" class="text-3xl font-black">0</div>
            </div>
            <div class="bg-white p-6 rounded-[2.5rem] border shadow-sm text-blue-500">
                <div class="text-[10px] font-black text-slate-400 uppercase mb-1">Running</div>
                <div id="metric-run" class="text-3xl font-black">0</div>
            </div>
            <div class="bg-white p-6 rounded-[2.5rem] border shadow-sm text-emerald-500">
                <div class="text-[10px] font-black text-slate-400 uppercase mb-1">Finished</div>
                <div id="metric-done" class="text-3xl font-black">0</div>
            </div>
        </div>

        <div class="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-50/50 border-b">
                            <th class="px-6 py-5 text-[10px] font-black text-slate-400 uppercase">Seq</th>
                            <th class="px-6 py-5 text-[10px] font-black text-slate-400 uppercase">Process Order No</th>
                            <th class="px-6 py-5 text-[10px] font-black text-slate-400 uppercase">Customer / Delivery</th>
                            <th class="px-6 py-5 text-[10px] font-black text-slate-400 uppercase text-right">Status</th>
                        </tr>
                    </thead>
                    <tbody id="table-body" class="divide-y divide-slate-50">
                        <tr><td colspan="4" class="p-10 text-center text-slate-400 italic">Menyambungkan ke Google Sheets...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        // TAUTAN ASLI ANDA
        const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS5oxW4v4lVSiKmn8vUwaYIuzRDOoTCOhu0jB9zk6_WDM9ar1yAiPwrIZGUFvf3zXAqWcjnCaUyRKAu/pub?output=csv";

        let allData = [];

        async function fetchData() {
            const icon = document.getElementById('refresh-icon');
            icon.classList.add('refreshing');
            try {
                const response = await fetch(SHEET_URL + "&t=" + Date.now());
                const csvText = await response.text();
                
                const rows = csvText.split(/\r?\n/).filter(l => l.trim() !== "").map(row => {
                    return row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(p => p.replace(/^"|"$/g, '').trim());
                });

                // Menyesuaikan dengan struktur Sheets Anda: SEQ ada di baris ke-3 (index 2)
                allData = rows.slice(2).map((row, i) => ({
                    seq: row[0] || "-",        // Kolom A
                    order: row[2] || "-",      // Kolom C
                    customer: row[18] || "-",  // Kolom S
                    delivery: row[3] || "-",   // Kolom D
                    status: row[12] || "Wait", // Kolom M
                    spec: row[7] || ""         // Kolom H
                })).filter(item => item.seq !== "-" && !isNaN(item.seq));

                render();
                updateMetrics();
                document.getElementById('sync-status').innerText = "SINKRON: " + new Date().toLocaleTimeString();
            } catch (err) {
                document.getElementById('sync-status').innerText = "KONEKSI GAGAL";
            } finally {
                icon.classList.remove('refreshing');
            }
        }

        function render() {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = allData.map(item => {
                let badgeStyle = "bg-slate-100 text-slate-500";
                const s = item.status.toLowerCase();
                if (s.includes('run')) badgeStyle = "bg-blue-100 text-blue-600";
                else if (s.includes('finish') || s.includes('done')) badgeStyle = "bg-emerald-100 text-emerald-600";
                else if (s.includes('wait')) badgeStyle = "bg-amber-100 text-amber-600";

                return `
                    <tr class="hover:bg-indigo-50/30 transition-colors">
                        <td class="px-6 py-4 font-mono text-slate-300 font-bold text-sm">${item.seq}</td>
                        <td class="px-6 py-4">
                            <div class="font-black text-slate-800 text-sm leading-none">${item.order}</div>
                            <div class="text-[10px] text-slate-400 font-bold uppercase mt-1 tracking-tight">${item.spec}</div>
                        </td>
                        <td class="px-6 py-4">
                            <div class="text-sm font-semibold text-slate-700">${item.customer}</div>
                            <div class="text-[10px] text-indigo-500 font-black uppercase">${item.delivery}</div>
                        </td>
                        <td class="px-6 py-4 text-right">
                            <span class="px-3 py-1 rounded-xl text-[10px] font-black uppercase tracking-wider ${badgeStyle}">${item.status}</span>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function updateMetrics() {
            document.getElementById('metric-total').innerText = allData.length;
            document.getElementById('metric-wait').innerText = allData.filter(d => d.status.toLowerCase().includes('wait')).length;
            document.getElementById('metric-run').innerText = allData.filter(d => d.status.toLowerCase().includes('run')).length;
            document.getElementById('metric-done').innerText = allData.filter(d => d.status.toLowerCase().includes('finish') || d.status.toLowerCase().includes('done')).length;
        }

        window.onload = fetchData;
    </script>
</body>
</html>
