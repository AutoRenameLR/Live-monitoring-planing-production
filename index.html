<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEVELER MONITORING SCHEDULE - HSSI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .bg-hssi-green { background-color: #00843d; }
        @keyframes slideUp { from { transform: translate(-50%, 100%); opacity: 0; } to { transform: translate(-50%, 0); opacity: 1; } }
        .animate-slide-up { animation: slideUp 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .animate-fade-in { animation: fadeIn 0.2s ease-out forwards; }
        .status-badge { transition: all 0.3s ease; }
    </style>
</head>
<body class="bg-[#f1f5f9] text-slate-900 min-h-screen">

    <!-- Header / Navbar -->
    <header class="bg-[#1e293b] text-white p-4 sticky top-0 z-50 shadow-lg border-b-[3px] border-[#00843d]">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center space-x-4">
                <div class="bg-white p-1 rounded-lg w-16 h-10 flex items-center justify-center overflow-hidden">
                    <img src="image_0aa23c.jpg" alt="HSSI" class="h-full object-contain" onerror="this.style.display='none'; this.parentElement.innerHTML='<span class=\'text-[10px] font-black text-[#00843d]\'>HSSI</span>';">
                </div>
                <div>
                    <h1 class="text-xl font-black italic tracking-tight uppercase leading-none">LEVELER SCHEDULE MONITOR</h1>
                    <p id="sync-status" class="text-[10px] text-[#22c55e] font-bold tracking-widest mt-1 uppercase italic">TERHUBUNG: MENCARI...</p>
                </div>
            </div>

            <div class="flex items-center gap-3 w-full md:w-auto">
                <div class="flex bg-white/5 p-1 rounded-xl items-center border border-white/10 flex-1 md:w-80">
                    <input type="text" id="manualInput" placeholder="Scan / Ketik CC No..." class="bg-transparent border-none text-xs font-bold px-3 py-1.5 focus:ring-0 outline-none w-full placeholder:text-slate-500 text-white" onkeypress="if(event.key === 'Enter') processManualInput()">
                    <button onclick="toggleScanner()" class="bg-[#00843d] hover:bg-emerald-600 p-2 rounded-lg transition-colors flex items-center gap-2 text-[10px] font-black uppercase whitespace-nowrap">
                        <i data-lucide="camera" class="w-3.5 h-3.5"></i> SCAN
                    </button>
                </div>
                <button onclick="fetchData()" id="refreshBtn" class="bg-slate-700 hover:bg-slate-600 p-2.5 rounded-xl border border-white/10 transition-all active:scale-95">
                    <i data-lucide="refresh-cw" class="w-4 h-4"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-4 md:p-6">
        
        <!-- Scanner Overlay -->
        <div id="scanner-container" class="hidden mb-6 bg-black rounded-3xl overflow-hidden border-4 border-[#00843d] shadow-2xl relative animate-fade-in">
            <div id="reader" style="width: 100%;"></div>
            <button onclick="toggleScanner()" class="absolute top-4 right-4 bg-rose-600 text-white p-2 rounded-full shadow-lg z-10 hover:bg-rose-700 transition-colors">
                <i data-lucide="x" class="w-5 h-5"></i>
            </button>
        </div>

        <!-- Dashboard Stats -->
        <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
            <div class="bg-white p-5 rounded-3xl border border-slate-200 shadow-sm flex flex-col justify-center">
                <div class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Total Plan</div>
                <div id="stat-total" class="text-2xl font-black text-slate-800 tracking-tighter">0</div>
            </div>
            <div class="bg-white p-5 rounded-3xl border border-slate-200 shadow-sm flex flex-col justify-center">
                <div class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">On Process</div>
                <div id="stat-process" class="text-2xl font-black text-sky-500 tracking-tighter">0</div>
            </div>
            <div class="bg-white p-5 rounded-3xl border border-slate-200 shadow-sm flex flex-col justify-center">
                <div class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Finished Today</div>
                <div id="stat-finished" class="text-2xl font-black text-emerald-500 tracking-tighter">0</div>
            </div>
            <div class="bg-white p-5 rounded-3xl border border-slate-200 shadow-sm flex flex-col justify-center">
                <div class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">With Issue</div>
                <div id="stat-issue" class="text-2xl font-black text-rose-500 tracking-tighter">0</div>
            </div>
        </div>

        <!-- Navigation & Search -->
        <div class="bg-white p-4 rounded-[1.5rem] shadow-sm border border-slate-200 mb-6 flex flex-col md:flex-row gap-4 items-center justify-between">
            <div class="flex bg-slate-100 p-1 rounded-2xl w-full md:w-auto">
                <button onclick="setTab('progress')" id="tab-progress" class="flex-1 md:flex-none px-6 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all flex items-center justify-center gap-2 bg-white text-slate-900 shadow-sm border border-slate-200">
                    <i data-lucide="clock" class="w-3.5 h-3.5"></i> PROGRESS LIST
                </button>
                <button onclick="setTab('finished')" id="tab-finished" class="flex-1 md:flex-none px-6 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all flex items-center justify-center gap-2 text-slate-500 hover:text-slate-700">
                    <i data-lucide="check-circle" class="w-3.5 h-3.5"></i> HISTORY (REPORT)
                </button>
            </div>
            
            <div class="relative w-full md:w-80">
                <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 w-4 h-4"></i>
                <input type="text" id="searchInput" oninput="handleSearch()" placeholder="Cari No Order / CC / Customer..." class="w-full pl-12 pr-4 py-3 bg-slate-50 border-none rounded-2xl text-sm font-bold outline-none ring-1 ring-slate-200 focus:ring-emerald-500 transition-all">
            </div>
        </div>

        <!-- Table Container -->
        <div class="bg-white rounded-[1.5rem] shadow-xl border border-slate-200 overflow-hidden min-h-[500px]">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse min-w-[1200px]">
                    <thead>
                        <tr class="bg-slate-50/50 border-b border-slate-100">
                            <th class="px-6 py-5 text-[10px] font-black text-slate-400 uppercase tracking-widest">Seq</th>
                            <th class="px-6 py-5 text-[10px] font-black text-slate-400 uppercase tracking-widest">Order Info</th>
                            <th class="px-6 py-5 text-[10px] font-black text-slate-400 uppercase tracking-widest">Size</th>
                            <th class="px-6 py-5 text-[10px] font-black text-slate-400 uppercase tracking-widest">Berat</th>
                            <th class="px-6 py-5 text-[10px] font-black text-slate-400 uppercase tracking-widest">CC No</th>
                            <th class="px-6 py-5 text-[10px] font-black text-slate-400 uppercase tracking-widest">Laporan Kendala</th>
                            <th class="px-6 py-5 text-[10px] font-black text-slate-400 uppercase tracking-widest text-center">Status</th>
                            <th class="px-6 py-5 text-[10px] font-black text-slate-400 uppercase tracking-widest text-center">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="table-body" class="divide-y divide-slate-50">
                        <tr>
                            <td colspan="8" class="py-20 text-center text-slate-400 font-bold uppercase tracking-widest">Memuat Data...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Modal Laporan Kendala -->
    <div id="modal-kendala" class="fixed inset-0 z-[100] hidden items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm">
        <div class="bg-white rounded-[2rem] w-full max-w-md shadow-2xl p-8 border border-slate-200 animate-fade-in relative">
            <h3 class="text-xl font-black italic text-slate-800 uppercase tracking-tight mb-6 flex items-center gap-2">
                <i data-lucide="alert-triangle" class="text-rose-500 w-6 h-6"></i> Laporkan Kendala
            </h3>
            
            <div class="mb-6 p-4 bg-emerald-50 rounded-2xl border border-emerald-100">
                <p class="text-[10px] font-black text-emerald-600 uppercase mb-1">Identitas Item</p>
                <p id="modal-cc-info" class="text-sm font-bold text-slate-700">-</p>
            </div>

            <div class="relative mb-6">
                <select id="kendala-select" onchange="toggleOtherKendala()" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl text-sm font-bold appearance-none focus:ring-2 focus:ring-rose-500 outline-none pr-10">
                    <option value="" disabled selected>Pilih Jenis Kendala</option>
                    <option value="TBM">TBM</option>
                    <option value="PACKING COIL BACK">PACKING COIL BACK</option>
                    <option value="WAITING MC">WAITING MC</option>
                    <option value="WAITING CRANE">WAITING CRANE</option>
                    <option value="WINDER TOP/END">WINDER TOP/END</option>
                    <option value="CLEANING MACHINE">CLEANING MACHINE</option>
                    <option value="PROBLEM MACHINE">PROBLEM MACHINE</option>
                    <option value="OTHER">OTHER (Lainnya)</option>
                </select>
                <i data-lucide="chevron-down" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none w-5 h-5"></i>
            </div>
            
            <div id="kendala-other-container" class="hidden mb-8 animate-fade-in">
                <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2 block">Ketik Detail Kendala</label>
                <input type="text" id="kendala-other-input" placeholder="Masukkan kendala..." class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl text-sm font-bold outline-none focus:ring-2 focus:ring-rose-500">
            </div>

            <!-- Input Waktu Kendala Tambahan -->
            <div class="mb-8 animate-fade-in">
                <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2 block">Lama Kendala (Menit)</label>
                <input type="number" id="kendala-waktu-input" placeholder="Contoh: 15" min="0" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl text-sm font-bold outline-none focus:ring-2 focus:ring-rose-500">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <button onclick="closeModal()" class="py-4 bg-slate-100 text-slate-500 rounded-2xl font-black text-[12px] uppercase tracking-widest hover:bg-slate-200 transition-all">Batal</button>
                <button onclick="saveKendala()" class="py-4 bg-rose-600 text-white rounded-2xl font-black text-[12px] uppercase tracking-widest hover:bg-rose-700 transition-all shadow-lg shadow-rose-200">Simpan</button>
            </div>
        </div>
    </div>

    <!-- Modal Finish Report -->
    <div id="modal-finish" class="fixed inset-0 z-[100] hidden items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm overflow-y-auto">
        <div class="bg-white rounded-[2rem] w-full max-w-lg shadow-2xl p-8 border border-slate-200 animate-fade-in relative my-8">
            <h3 class="text-xl font-black italic text-emerald-700 uppercase tracking-tight mb-6 flex items-center gap-2">
                <i data-lucide="check-square" class="text-emerald-500 w-6 h-6"></i> Laporan Produksi (Finish)
            </h3>
            
            <div class="mb-6 p-4 bg-slate-50 rounded-2xl border border-slate-200">
                <p class="text-[10px] font-black text-slate-500 uppercase mb-1">Identitas Order</p>
                <p id="finish-order-info" class="text-sm font-bold text-slate-800">-</p>
            </div>

            <div class="space-y-4 mb-8">
                <!-- Product Width -->
                <div>
                    <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-1.5 block">Product Width (Otomatis dari Plan)</label>
                    <input type="text" id="finish-width" class="w-full p-3.5 bg-white border border-slate-200 rounded-xl text-sm font-bold outline-none focus:ring-2 focus:ring-emerald-500">
                </div>

                <!-- QTY Grid -->
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-1.5 block">Qty Finish Good (FG)</label>
                        <input type="number" id="finish-qty-fg" placeholder="0" class="w-full p-3.5 bg-white border border-slate-200 rounded-xl text-sm font-bold outline-none focus:ring-2 focus:ring-emerald-500">
                    </div>
                    <div>
                        <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-1.5 block">Qty Not Good (NG)</label>
                        <input type="number" id="finish-qty-ng" placeholder="0" class="w-full p-3.5 bg-white border border-slate-200 rounded-xl text-sm font-bold outline-none focus:ring-2 focus:ring-rose-500">
                    </div>
                </div>

                <!-- Line Speed -->
                <div>
                    <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-1.5 block">Line Speed</label>
                    <input type="text" id="finish-speed" placeholder="Contoh: 150 m/min" class="w-full p-3.5 bg-white border border-slate-200 rounded-xl text-sm font-bold outline-none focus:ring-2 focus:ring-emerald-500">
                </div>

                <!-- Remark -->
                <div>
                    <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-1.5 block">Remark / Catatan Tambahan</label>
                    <textarea id="finish-remark" rows="2" placeholder="Ketikan catatan jika ada..." class="w-full p-3.5 bg-white border border-slate-200 rounded-xl text-sm font-bold outline-none focus:ring-2 focus:ring-emerald-500 resize-none"></textarea>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <button onclick="closeFinishModal()" class="py-4 bg-slate-100 text-slate-500 rounded-2xl font-black text-[12px] uppercase tracking-widest hover:bg-slate-200 transition-all">Batal</button>
                <button onclick="submitFinish()" class="py-4 bg-emerald-600 text-white rounded-2xl font-black text-[12px] uppercase tracking-widest hover:bg-emerald-700 transition-all shadow-lg shadow-emerald-200">Submit & Finish</button>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 px-8 py-4 rounded-2xl font-black text-[11px] shadow-2xl z-[110] flex items-center gap-3 uppercase tracking-widest hidden animate-slide-up">
        <i id="toast-icon" data-lucide="check-circle" class="w-4 h-4"></i>
        <span id="toast-message"></span>
    </div>

    <script>
        // --- CONFIGURATION ---
        const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS5oxW4v4lVSiKmn8vUwaYIuzRDOoTCOhu0jB9zk6_WDM9ar1yAiPwrIZGUFvf3zXAqWcjnCaUyRKAu/pub?output=csv";
        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwA5sIFiykoWA7dDUhxeut-hjf5SmdxivuN9H8mra9HpE_abbegONCa7JQrys5Z9f1A/exec"; 

        let appData = [];
        let completedItems = [];
        let activeTab = 'progress';
        let searchQuery = '';
        let showScanner = false;
        let html5QrCode = null;
        let selectedItemId = null;
        let finishingItemId = null;

        // Initialize Icons on load
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            fetchData();
        });

        async function fetchData() {
            const refreshBtn = document.getElementById('refreshBtn').querySelector('svg');
            refreshBtn.classList.add('animate-spin', 'text-emerald-400');
            
            try {
                const response = await fetch(`${SHEET_CSV_URL}&t=${new Date().getTime()}`);
                if (!response.ok) throw new Error("Gagal akses data");
                
                const csvText = await response.text();
                const rows = parseCSV(csvText);
                
                const headerIdx = rows.findIndex(r => r.some(c => c?.toUpperCase().includes('SEQ') || c?.toUpperCase().includes('ORDER')));
                if (headerIdx === -1) throw new Error("Header tidak ditemukan");

                const headers = rows[headerIdx].map(h => h.toUpperCase().trim().replace(/\s/g, '_'));
                
                const idx = {
                    seq: headers.findIndex(h => h.includes('SEQ')),
                    order: headers.findIndex(h => h.includes('ORDER') || h.includes('PROCESS_ORDER')),
                    customer: headers.findIndex(h => h.includes('CUSTOMER')),
                    spec: headers.findIndex(h => h.includes('SPEC')),
                    ccNo: headers.findIndex(h => h.includes('PACKING') || h.includes('CC')), 
                    size: headers.findIndex(h => h.includes('SIZE') || h.includes('PLAN') || h.includes('DIMENSI')), 
                    berat: headers.findIndex(h => h.includes('BERAT') || h.includes('WEIGHT'))
                };

                const newData = rows.slice(headerIdx + 1)
                    .filter(row => row[idx.order] && row[idx.order].trim() !== "")
                    .map((row, i) => {
                        const orderNo = row[idx.order] || "N/A";
                        const existing = appData.find(item => item.orderNo === orderNo);
                        
                        let rawSizePlan = idx.size !== -1 ? (row[idx.size] || "-") : "-";
                        let extractedWidth = rawSizePlan.split('/')[0].trim();
                        
                        return {
                            id: `row-${i}-${orderNo}`,
                            seq: row[idx.seq] || (i + 1).toString(),
                            orderNo: orderNo,
                            customer: row[idx.customer] || "Unknown",
                            spec: idx.spec !== -1 ? (row[idx.spec] || "") : "",
                            ccNo: idx.ccNo !== -1 ? (row[idx.ccNo] || "") : "",
                            size: rawSizePlan,
                            berat: idx.berat !== -1 ? (row[idx.berat] || "-") : "-",
                            productWidth: extractedWidth,
                            status: existing ? existing.status : "WAITING",
                            kendala: existing ? existing.kendala : "",
                            kendalaWaktu: existing ? existing.kendalaWaktu : "",
                            startTime: existing ? existing.startTime : null
                        };
                    });

                appData = newData.filter(item => !completedItems.some(c => c.orderNo === item.orderNo));
                
                document.getElementById('sync-status').innerText = `TERHUBUNG: ${new Date().toLocaleTimeString()}`;
                renderTable();
                updateStats();
            } catch (err) {
                console.error(err);
                showToast("Gagal mengambil data Sheet", "error");
            } finally {
                refreshBtn.classList.remove('animate-spin', 'text-emerald-400');
            }
        }

        function parseCSV(text) {
            const rows = [];
            let curRow = [];
            let curCell = '';
            let inQuote = false;
            for (let i = 0; i < text.length; i++) {
                const c = text[i];
                if (c === '"') {
                    if (inQuote && text[i+1] === '"') { curCell += '"'; i++; }
                    else inQuote = !inQuote;
                }
                else if (c === ',' && !inQuote) { curRow.push(curCell.trim()); curCell = ''; }
                else if ((c === '\n' || c === '\r') && !inQuote) {
                    if (curCell || curRow.length > 0) {
                        curRow.push(curCell.trim()); rows.push(curRow);
                        curCell = ''; curRow = [];
                    }
                } else curCell += c;
            }
            if (curCell || curRow.length > 0) { curRow.push(curCell.trim()); rows.push(curRow); }
            return rows;
        }

        function renderTable() {
            const tbody = document.getElementById('table-body');
            const dataToDisplay = activeTab === 'progress' ? appData : completedItems;
            
            const filteredData = dataToDisplay.filter(item => 
                item.orderNo.toLowerCase().includes(searchQuery) || 
                item.customer.toLowerCase().includes(searchQuery) ||
                item.ccNo.toLowerCase().includes(searchQuery)
            );

            if (filteredData.length === 0) {
                tbody.innerHTML = `<tr><td colspan="8" class="py-20 text-center text-slate-400 font-bold uppercase tracking-widest">Data tidak ditemukan</td></tr>`;
                return;
            }

            tbody.innerHTML = filteredData.map(item => {
                let statusClass = "bg-slate-50 text-slate-400 border-slate-200";
                if(item.status === 'ON PROCESS') statusClass = "bg-sky-50 text-sky-600 border-sky-200 animate-pulse";
                if(item.status === 'COMPLETED') statusClass = "bg-emerald-50 text-emerald-600 border-emerald-200";
                if(item.kendala) statusClass = "bg-rose-50 text-rose-600 border-rose-200";

                return `
                    <tr class="group hover:bg-slate-50/80 transition-colors">
                        <td class="px-6 py-6 font-black italic text-2xl text-slate-200 group-hover:text-emerald-100 transition-colors">${item.seq}</td>
                        <td class="px-6 py-6">
                            <div class="text-sm font-black text-slate-800 tracking-tight">${item.orderNo}</div>
                            <div class="text-[10px] text-slate-400 font-bold uppercase tracking-tight">${item.customer}</div>
                        </td>
                        <td class="px-6 py-6 text-xs font-bold text-slate-600">
                            ${item.size}
                        </td>
                        <td class="px-6 py-6 text-xs font-bold text-slate-600">
                            ${item.berat}
                        </td>
                        <td class="px-6 py-6">
                            <div class="px-4 py-2 bg-slate-100/50 rounded-xl border border-slate-200 text-[11px] font-black text-slate-700 min-w-[120px]">
                                ${item.ccNo || "N/A"}
                            </div>
                        </td>
                        <td class="px-6 py-6">
                            <div onclick="openModal('${item.id}')" class="w-full px-4 py-2 bg-slate-100/50 border border-slate-200 rounded-xl text-[10px] font-bold text-slate-500 cursor-pointer hover:bg-slate-100 flex flex-col justify-center transition-colors">
                                <div class="flex items-center justify-between w-full">
                                    <span class="${item.kendala ? 'text-rose-600 font-black' : ''}">${item.kendala || "Tulis kendala..."}</span>
                                    <i data-lucide="alert-circle" class="w-3 h-3"></i>
                                </div>
                                ${item.kendalaWaktu ? `<span class="text-[9px] text-rose-400 mt-1 uppercase tracking-widest">${item.kendalaWaktu} Menit</span>` : ''}
                            </div>
                        </td>
                        <td class="px-6 py-6 text-center">
                            <span class="status-badge px-4 py-1.5 rounded-xl text-[9px] font-black uppercase tracking-widest border shadow-sm ${statusClass}">
                                ${item.status}
                            </span>
                        </td>
                        <td class="px-6 py-6">
                            <div class="flex justify-center gap-2">
                                ${activeTab === 'progress' ? `
                                    <button onclick="processScan('${item.ccNo || item.orderNo}')" class="px-4 py-2 rounded-xl text-[10px] font-black uppercase tracking-tighter transition-all ${item.status === 'ON PROCESS' ? 'bg-emerald-600 text-white shadow-lg' : 'bg-sky-500 text-white shadow-md'}">
                                        ${item.status === 'ON PROCESS' ? 'FINISH' : 'START'}
                                    </button>
                                ` : `
                                    <span class="text-[10px] font-bold text-slate-400">🏁 ${item.finishedAt}</span>
                                `}
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');
            lucide.createIcons();
        }

        function updateStats() {
            document.getElementById('stat-total').innerText = appData.length + completedItems.length;
            document.getElementById('stat-process').innerText = appData.filter(i => i.status === 'ON PROCESS').length;
            document.getElementById('stat-finished').innerText = completedItems.length;
            document.getElementById('stat-issue').innerText = appData.filter(i => i.kendala).length;
        }

        function processManualInput() {
            const val = document.getElementById('manualInput').value.trim();
            if (val) {
                processScan(val);
                document.getElementById('manualInput').value = '';
            }
        }

        async function processScan(val) {
            const index = appData.findIndex(item => 
                (item.ccNo && item.ccNo.toLowerCase() === val.toLowerCase()) || 
                item.orderNo.toLowerCase() === val.toLowerCase()
            );
            
            if (index !== -1) {
                const item = appData[index];
                
                if (item.status === "WAITING") {
                    item.status = "ON PROCESS";
                    item.startTime = new Date().toLocaleTimeString();
                    showToast(`${val} Dimulai (On Process)`, 'success');
                    sendToReportSheet(item, "START");
                    renderTable();
                    updateStats();
                } else if (item.status === "ON PROCESS") {
                    openFinishModal(item.id);
                }
            } else {
                showToast(`ID "${val}" tidak ditemukan di antrean!`, 'error');
            }
        }

        function setTab(tab) {
            activeTab = tab;
            const btnProg = document.getElementById('tab-progress');
            const btnFin = document.getElementById('tab-finished');

            if(tab === 'progress') {
                btnProg.className = "flex-1 md:flex-none px-6 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all flex items-center justify-center gap-2 bg-white text-slate-900 shadow-sm border border-slate-200";
                btnFin.className = "flex-1 md:flex-none px-6 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all flex items-center justify-center gap-2 text-slate-500 hover:text-slate-700";
            } else {
                btnFin.className = "flex-1 md:flex-none px-6 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all flex items-center justify-center gap-2 bg-white text-slate-900 shadow-sm border border-slate-200";
                btnProg.className = "flex-1 md:flex-none px-6 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all flex items-center justify-center gap-2 text-slate-500 hover:text-slate-700";
            }
            renderTable();
        }

        function handleSearch() {
            searchQuery = document.getElementById('searchInput').value.toLowerCase();
            renderTable();
        }

        function toggleScanner() {
            const container = document.getElementById('scanner-container');
            showScanner = !showScanner;

            if (showScanner) {
                container.classList.remove('hidden');
                if (!html5QrCode) {
                    html5QrCode = new Html5Qrcode("reader");
                }
                html5QrCode.start(
                    { facingMode: "environment" },
                    { fps: 10, qrbox: { width: 250, height: 250 } },
                    (decodedText) => {
                        toggleScanner();
                        processScan(decodedText);
                    },
                    (err) => { /* ignore */ }
                ).catch(err => {
                    showToast("Kamera tidak dapat diakses", "error");
                    toggleScanner();
                });
            } else {
                container.classList.add('hidden');
                if (html5QrCode && html5QrCode.isScanning) {
                    html5QrCode.stop().catch(console.error);
                }
            }
        }

        function openModal(id) {
            selectedItemId = id;
            const item = appData.find(i => i.id === id) || completedItems.find(i => i.id === id);
            document.getElementById('modal-cc-info').innerText = `${item.orderNo} | ${item.ccNo}`;
            
            const select = document.getElementById('kendala-select');
            const otherContainer = document.getElementById('kendala-other-container');
            const otherInput = document.getElementById('kendala-other-input');
            
            const standardOptions = ["TBM", "PACKING COIL BACK", "WAITING MC", "WAITING CRANE", "WINDER TOP/END", "CLEANING MACHINE", "PROBLEM MACHINE"];
            
            if (!item.kendala) {
                select.value = "";
                otherContainer.classList.add('hidden');
                otherInput.value = "";
            } else if (standardOptions.includes(item.kendala)) {
                select.value = item.kendala;
                otherContainer.classList.add('hidden');
            } else {
                select.value = "OTHER";
                otherContainer.classList.remove('hidden');
                otherInput.value = item.kendala;
            }

            document.getElementById('kendala-waktu-input').value = item.kendalaWaktu || "";

            document.getElementById('modal-kendala').classList.remove('hidden');
            document.getElementById('modal-kendala').classList.add('flex');
        }

        function toggleOtherKendala() {
            const selectVal = document.getElementById('kendala-select').value;
            const otherContainer = document.getElementById('kendala-other-container');
            if (selectVal === "OTHER") {
                otherContainer.classList.remove('hidden');
                document.getElementById('kendala-other-input').focus();
            } else {
                otherContainer.classList.add('hidden');
            }
        }

        function closeModal() {
            document.getElementById('modal-kendala').classList.add('hidden');
            document.getElementById('modal-kendala').classList.remove('flex');
            selectedItemId = null;
        }

        function saveKendala() {
            const selectVal = document.getElementById('kendala-select').value;
            let finalKendala = selectVal;
            
            if (selectVal === "OTHER") {
                finalKendala = document.getElementById('kendala-other-input').value.trim();
                if(!finalKendala) {
                    showToast("Harap isi detail kendala!", "error");
                    return;
                }
            }

            const waktuKendala = document.getElementById('kendala-waktu-input').value.trim();

            if (selectedItemId && finalKendala) {
                const item = appData.find(i => i.id === selectedItemId);
                if (item) {
                    item.kendala = finalKendala;
                    item.kendalaWaktu = waktuKendala;
                    renderTable();
                    updateStats();
                    showToast("Kendala Berhasil Disimpan", "success");
                    sendToReportSheet(item, "ISSUE_REPORT");
                }
            }
            closeModal();
        }

        function openFinishModal(id) {
            finishingItemId = id;
            const item = appData.find(i => i.id === id);
            
            document.getElementById('finish-order-info').innerText = `${item.orderNo} | ${item.ccNo}`;
            document.getElementById('finish-width').value = item.productWidth || "";
            
            document.getElementById('finish-qty-fg').value = "";
            document.getElementById('finish-qty-ng').value = "";
            document.getElementById('finish-speed').value = "";
            document.getElementById('finish-remark').value = "";

            document.getElementById('modal-finish').classList.remove('hidden');
            document.getElementById('modal-finish').classList.add('flex');
        }

        function closeFinishModal() {
            document.getElementById('modal-finish').classList.add('hidden');
            document.getElementById('modal-finish').classList.remove('flex');
            finishingItemId = null;
        }

        // --- SUBMIT FINISH ---
        function submitFinish() {
            if (!finishingItemId) return;
            
            const index = appData.findIndex(item => item.id === finishingItemId);
            if (index === -1) return;

            const item = appData[index];
            
            const width = document.getElementById('finish-width').value;
            const qtyFG = document.getElementById('finish-qty-fg').value;
            const qtyNG = document.getElementById('finish-qty-ng').value;
            const speed = document.getElementById('finish-speed').value;
            const remark = document.getElementById('finish-remark').value;

            if (!qtyFG) {
                showToast("Qty FG wajib diisi!", "error");
                return;
            }

            item.status = "COMPLETED";
            item.finishedAt = new Date().toLocaleTimeString();
            item.productWidth = width;
            item.qtyFG = qtyFG;
            item.qtyNG = qtyNG || 0;
            item.speed = speed;
            item.remark = remark;

            // Pindahkan ke daftar completed
            completedItems.unshift(item);
            appData.splice(index, 1);

            showToast(`${item.ccNo || item.orderNo} Selesai!`, 'success');
            sendToReportSheet(item, "FINISH");
            
            closeFinishModal();
            renderTable();
            updateStats();
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const icon = document.getElementById('toast-icon');
            const msgEl = document.getElementById('toast-message');

            const bgClass = type === 'success' ? 'bg-emerald-600' : 'bg-rose-600';
            const iconType = type === 'success' ? 'check-circle' : 'alert-circle';
            
            toast.className = `fixed bottom-8 left-1/2 -translate-x-1/2 px-8 py-4 rounded-2xl font-black text-[11px] text-white shadow-2xl z-[110] flex items-center gap-3 uppercase tracking-widest animate-slide-up ${bgClass}`;
            icon.setAttribute('data-lucide', iconType);
            msgEl.innerText = message;
            
            lucide.createIcons();
            toast.classList.remove('hidden');

            setTimeout(() => {
                toast.classList.add('hidden');
            }, 3000);
        }

        function sendToReportSheet(item, action) {
            let kendalaGabungan = item.kendala || "";
            if (item.kendala && item.kendalaWaktu) {
                kendalaGabungan += ` (${item.kendalaWaktu} Menit)`;
            }

            const payload = {
                action: action,
                "CC NO": item.ccNo || item.orderNo || "",
                "CUSTOMER": item.customer || "",
                "SPEC": item.spec || "",
                "SIZE": item.size || "",
                "WEIGHT": item.berat || "",
                "PRODUCT SIZE": item.productWidth || "",
                "QTY FINISH GOOD": item.qtyFG || "",
                "QTY NOT GOOD": item.qtyNG || "",
                "START PROCESS": item.startTime || "",
                "END PROCESS": item.finishedAt || "",
                "KENDALA": kendalaGabungan,
                "REMARK": item.remark || ""
            };

            // Menggunakan mode no-cors untuk melempar data ke AppScript secara asinkronus tanpa kendala keamanan browser (Fire & Forget)
            fetch(APPS_SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(payload)
            }).catch(err => console.error("Error sending data to Apps Script:", err));
        }
    </script>
</body>
