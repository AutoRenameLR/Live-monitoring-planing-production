<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SL1 Cloud Monitor - PPC Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
        @keyframes spin-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .refreshing { animation: spin-slow 1s linear infinite; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">

    <!-- Header -->
    <header class="bg-slate-900 text-white p-4 sticky top-0 z-30 shadow-xl border-b border-white/5">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <div class="p-2 bg-indigo-600 rounded-xl shadow-lg shadow-indigo-500/20">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"></ellipse><path d="M3 5V19A9 3 0 0 0 21 19V5"></path><path d="M3 12A9 3 0 0 0 21 12"></path></svg>
                </div>
                <div>
                    <h1 class="text-lg font-black tracking-tight leading-none uppercase">SL1 Cloud Monitor</h1>
                    <p id="sync-status" class="text-[10px] text-slate-400 font-bold tracking-widest mt-1 uppercase">Menunggu Data...</p>
                </div>
            </div>
            <button onclick="fetchData()" id="refresh-btn" class="group flex items-center bg-slate-800 hover:bg-indigo-600 px-4 py-2 rounded-xl text-[11px] font-black transition-all active:scale-95 border border-slate-700">
                <svg id="refresh-icon" class="mr-2" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"></path><path d="M21 3v5h-5"></path></svg>
                <span id="btn-text">REFRESH DATA</span>
            </button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-4 md:p-6">
        <!-- Error Alert -->
        <div id="error-alert" class="hidden mb-6 p-5 bg-rose-50 border-2 border-rose-100 rounded-3xl flex items-center text-rose-800 shadow-sm">
            <svg class="mr-4 shrink-0" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"></path><path d="M12 9v4"></path><path d="M12 17h.01"></path></svg>
            <div>
                <p class="text-xs font-black uppercase tracking-widest mb-1">Terjadi Kesalahan</p>
                <p id="error-message" class="text-sm font-medium opacity-80"></p>
            </div>
        </div>

        <!-- Metrics -->
        <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
            <div class="bg-white p-6 rounded-[2rem] border border-slate-200 flex items-center shadow-sm">
                <div class="p-4 rounded-2xl bg-slate-800 text-white mr-5 shadow-lg"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"></path><polyline points="14 2 14 8 20 8"></polyline></svg></div>
                <div><div class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Total Plan</div><div id="metric-total" class="text-3xl font-black text-slate-800 tracking-tighter">0</div></div>
            </div>
            <div class="bg-white p-6 rounded-[2rem] border border-slate-200 flex items-center shadow-sm">
                <div class="p-4 rounded-2xl bg-amber-500 text-white mr-5 shadow-lg"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg></div>
                <div><div class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Waiting</div><div id="metric-wait" class="text-3xl font-black text-slate-800 tracking-tighter">0</div></div>
            </div>
            <div class="bg-white p-6 rounded-[2rem] border border-slate-200 flex items-center shadow-sm">
                <div class="p-4 rounded-2xl bg-blue-500 text-white mr-5 shadow-lg"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"></path><circle cx="12" cy="12" r="3"></circle></svg></div>
                <div><div class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Running</div><div id="metric-run" class="text-3xl font-black text-slate-800 tracking-tighter">0</div></div>
            </div>
            <div class="bg-white p-6 rounded-[2rem] border border-slate-200 flex items-center shadow-sm">
                <div class="p-4 rounded-2xl bg-emerald-500 text-white mr-5 shadow-lg"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg></div>
                <div><div class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Finished</div><div id="metric-done" class="text-3xl font-black text-slate-800 tracking-tighter">0</div></div>
            </div>
        </div>

        <!-- Controls -->
        <div class="bg-white p-4 rounded-3xl shadow-sm border border-slate-200 mb-6 flex flex-col md:flex-row gap-4 items-center">
            <div class="relative flex-1 w-full">
                <svg class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                <input id="search-input" type="text" placeholder="Cari Order No atau Customer..." class="w-full pl-12 pr-4 py-3 bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-indigo-500 text-sm font-medium outline-none transition-all">
            </div>
            <div class="flex bg-slate-100 p-1.5 rounded-2xl self-stretch md:self-auto" id="filter-container">
                <button onclick="setFilter('All')" class="filter-btn flex-1 md:flex-none px-5 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all bg-white text-indigo-600 shadow-sm">All</button>
                <button onclick="setFilter('Wait')" class="filter-btn flex-1 md:flex-none px-5 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all text-slate-500">Wait</button>
                <button onclick="setFilter('Run')" class="filter-btn flex-1 md:flex-none px-5 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all text-slate-500">Run</button>
                <button onclick="setFilter('Finish')" class="filter-btn flex-1 md:flex-none px-5 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all text-slate-500">Finish</button>
            </div>
        </div>

        <!-- Table -->
        <div class="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden min-h-[400px]">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-50/50 border-b border-slate-100">
                            <th class="px-6 py-5 text-[10px] font-black text-slate-400 uppercase tracking-[0.2em]">Seq</th>
                            <th class="px-6 py-5 text-[10px] font-black text-slate-400 uppercase tracking-[0.2em]">Product Detail</th>
                            <th class="px-6 py-5 text-[10px] font-black text-slate-400 uppercase tracking-[0.2em]">Customer / Delivery</th>
                            <th class="px-6 py-5 text-[10px] font-black text-slate-400 uppercase tracking-[0.2em]">Status</th>
                        </tr>
                    </thead>
                    <tbody id="table-body" class="divide-y divide-slate-50">
                        <!-- Data rows injected here -->
                    </tbody>
                </table>
            </div>
            <div id="empty-state" class="py-24 text-center hidden">
                <div class="flex flex-col items-center opacity-20">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><ellipse cx="12" cy="5" rx="9" ry="3"></ellipse><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"></path><path d="M3 12c0 1.66 4 3 9 3s9-1.34 9-3"></path></svg>
                    <p class="text-sm font-bold uppercase tracking-widest mt-4">Data Tidak Ditemukan</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        /**
         * PENTING: GANTI LINK DI BAWAH INI DENGAN LINK PUBLISH TO WEB (CSV) ANDA
         */
        const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS5oxW4v4lVSiKmn8vUwaYIuzRDOoTCOhu0jB9zk6_WDM9ar1yAiPwrIZGUFvf3zXAqWcjnCaUyRKAu/pub?output=csv";

        let allData = [];
        let currentFilter = 'All';
        let currentSearch = '';

        async function fetchData() {
            const btn = document.getElementById('refresh-btn');
            const icon = document.getElementById('refresh-icon');
            const btnText = document.getElementById('btn-text');
            const errorAlert = document.getElementById('error-alert');
            const errorMsg = document.getElementById('error-message');

            if (!SHEET_CSV_URL) {
                showError("URL Google Sheets belum diatur.");
                return;
            }

            // Start Loading UI
            btn.disabled = true;
            icon.classList.add('refreshing');
            btnText.innerText = "MEMUAT...";
            errorAlert.classList.add('hidden');

            try {
                // Fetch with cache busting
                const response = await fetch(`${SHEET_CSV_URL}&t=${new Date().getTime()}`);
                if (!response.ok) throw new Error("Gagal mengambil data dari Google Sheets. Cek apakah link 'Publish to Web' sudah benar.");
                
                const csvText = await response.text();
                const rows = parseCSV(csvText);
                
                if (rows.length < 2) throw new Error("Data Sheet kosong atau format tidak sesuai.");

                // Deteksi index header
                const headerRowIndex = rows.findIndex(row => row.some(cell => 
                    cell?.toUpperCase().includes('SEQ') || cell?.toUpperCase().includes('ORDER')
                ));

                if (headerRowIndex === -1) throw new Error("Baris header (SEQ/ORDER) tidak ditemukan.");

                const headers = rows[headerRowIndex].map(h => h.toUpperCase().replace(/\s/g, '_'));
                
                const idx = {
                    seq: headers.findIndex(h => h.includes('SEQ')),
                    order: headers.findIndex(h => h.includes('ORDER') || h.includes('PROCESS_ORDER')),
                    customer: headers.findIndex(h => h.includes('CUSTOMER')),
                    spec: headers.findIndex(h => h.includes('SPEC')),
                    size: headers.findIndex(h => h.includes('SIZE')),
                    weight: headers.findIndex(h => h.includes('WEIGHT')),
                    delivery: headers.findIndex(h => h.includes('DELIV')),
                    status: headers.findIndex(h => h.includes('STATUS'))
                };

                allData = rows.slice(headerRowIndex + 1)
                    .filter(row => row[idx.order] && row[idx.order].trim() !== "")
                    .map((row, i) => ({
                        id: i,
                        seq: row[idx.seq] || "-",
                        orderNo: row[idx.order] || "N/A",
                        customer: row[idx.customer] || "Unknown",
                        spec: row[idx.spec] || "",
                        size: row[idx.size] || "",
                        weight: row[idx.weight] || "0",
                        deliveryDate: row[idx.delivery] || "-",
                        status: row[idx.status] || "Pending"
                    }));

                document.getElementById('sync-status').innerText = `SINKRONISASI: ${new Date().toLocaleTimeString()}`;
                render();
                updateMetrics();

            } catch (err) {
                showError(err.message);
            } finally {
                btn.disabled = false;
                icon.classList.remove('refreshing');
                btnText.innerText = "REFRESH DATA";
            }
        }

        function parseCSV(text) {
            const rows = [];
            let curRow = [];
            let curCell = '';
            let inQuote = false;
            for (let i = 0; i < text.length; i++) {
                const c = text[i];
                if (c === '"') {
                    if (inQuote && text[i+1] === '"') { curCell += '"'; i++; }
                    else inQuote = !inQuote;
                }
                else if (c === ',' && !inQuote) { curRow.push(curCell.trim()); curCell = ''; }
                else if ((c === '\n' || c === '\r') && !inQuote) {
                    if (curCell || curRow.length > 0) {
                        curRow.push(curCell.trim());
                        rows.push(curRow);
                        curCell = ''; curRow = [];
                    }
                } else curCell += c;
            }
            return rows;
        }

        function render() {
            const tbody = document.getElementById('table-body');
            const emptyState = document.getElementById('empty-state');
            
            const filtered = allData.filter(item => {
                const matchFilter = currentFilter === 'All' || 
                    (currentFilter === 'Wait' && (item.status.toLowerCase().includes('wait') || item.status.toLowerCase().includes('pend'))) ||
                    (currentFilter === 'Run' && (item.status.toLowerCase().includes('run') || item.status.toLowerCase().includes('prog'))) ||
                    (currentFilter === 'Finish' && (item.status.toLowerCase().includes('finish') || item.status.toLowerCase().includes('comp') || item.status.toLowerCase().includes('done')));
                
                const search = currentSearch.toLowerCase();
                const matchSearch = item.orderNo.toLowerCase().includes(search) || item.customer.toLowerCase().includes(search);
                
                return matchFilter && matchSearch;
            });

            tbody.innerHTML = '';
            
            if (filtered.length === 0) {
                emptyState.classList.remove('hidden');
            } else {
                emptyState.classList.add('hidden');
                filtered.forEach(item => {
                    const statusClass = getStatusConfig(item.status);
                    const row = `
                        <tr class="group hover:bg-indigo-50/30 transition-colors">
                            <td class="px-6 py-4">
                                <span class="text-xl font-black text-slate-200 group-hover:text-indigo-200 italic">${item.seq}</span>
                            </td>
                            <td class="px-6 py-4">
                                <div class="font-bold text-slate-800 text-sm">${item.orderNo}</div>
                                <div class="text-[10px] text-slate-400 font-bold uppercase mt-1">${item.spec} • ${item.size} • ${item.weight} KG</div>
                            </td>
                            <td class="px-6 py-4">
                                <div class="text-xs font-black text-slate-600 uppercase">${item.customer}</div>
                                <div class="mt-1 inline-block px-2 py-0.5 bg-rose-50 text-rose-600 text-[9px] font-black rounded uppercase border border-rose-100">
                                    DLV: ${item.deliveryDate}
                                </div>
                            </td>
                            <td class="px-6 py-4">
                                <span class="px-3 py-1.5 rounded-xl text-[9px] font-black uppercase tracking-widest border ${statusClass.bg}">
                                    ${statusClass.text}
                                </span>
                            </td>
                        </tr>
                    `;
                    tbody.innerHTML += row;
                });
            }
        }

        function updateMetrics() {
            const counts = {
                total: allData.length,
                wait: allData.filter(d => d.status.toLowerCase().includes('wait') || d.status.toLowerCase().includes('pend')).length,
                run: allData.filter(d => d.status.toLowerCase().includes('run') || d.status.toLowerCase().includes('prog')).length,
                done: allData.filter(d => d.status.toLowerCase().includes('finish') || d.status.toLowerCase().includes('comp') || d.status.toLowerCase().includes('done')).length
            };
            document.getElementById('metric-total').innerText = counts.total;
            document.getElementById('metric-wait').innerText = counts.wait;
            document.getElementById('metric-run').innerText = counts.run;
            document.getElementById('metric-done').innerText = counts.done;
        }

        function getStatusConfig(status) {
            const s = status.toLowerCase();
            if (s.includes('pend') || s.includes('wait')) return { bg: 'bg-amber-50 text-amber-600 border-amber-100', text: 'WAITING' };
            if (s.includes('prog') || s.includes('run')) return { bg: 'bg-indigo-50 text-indigo-600 border-indigo-100', text: 'RUNNING' };
            if (s.includes('fini') || s.includes('comp') || s.includes('done')) return { bg: 'bg-emerald-50 text-emerald-600 border-emerald-100', text: 'FINISHED' };
            return { bg: 'bg-slate-100 text-slate-500 border-slate-200', text: 'N/A' };
        }

        function setFilter(f) {
            currentFilter = f;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                if(btn.innerText.includes(f)) {
                    btn.classList.add('bg-white', 'text-indigo-600', 'shadow-sm');
                    btn.classList.remove('text-slate-500');
                } else {
                    btn.classList.remove('bg-white', 'text-indigo-600', 'shadow-sm');
                    btn.classList.add('text-slate-500');
                }
            });
            render();
        }

        function showError(msg) {
            const alert = document.getElementById('error-alert');
            document.getElementById('error-message').innerText = msg;
            alert.classList.remove('hidden');
        }

        // Event Listeners
        document.getElementById('search-input').addEventListener('input', (e) => {
            currentSearch = e.target.value;
            render();
        });

        // Initialize
        window.onload = fetchData;
        
        // Auto Refresh every 5 minutes
        setInterval(fetchData, 300000);
    </script>
</body>
</html>
