<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SL1 MONITOR - PT HSSI</title>
    
    <!-- Tailwind CSS (Sudah Benar) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- PERBAIKAN: Link Google Fonts yang Lengkap -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com" rel="stylesheet">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        @keyframes spin-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .refreshing { animation: spin-slow 1s linear infinite; }
        .card-hover { transition: all 0.3s ease; }
        .card-hover:hover { transform: translateY(-5px); }
    </style>
</head>

<body class="bg-[#f0f4f0] text-slate-900 min-h-screen">

   <!-- Header Panel yang Diperbaiki -->
<header class="bg-[#064e3b] text-white p-4 sticky top-0 z-50 shadow-xl border-b border-white/10">
    <div class="max-w-7xl mx-auto flex justify-between items-center">
        <!-- Grup Logo & Nama (Menggunakan flex agar sejajar horizontal) -->
        <div class="flex items-center space-x-4">
            <!-- Logo HSSI Bentuk Diamond (Presisi sesuai gambar kamu) -->
            <div class="relative flex items-center justify-center bg-white p-1 rounded-lg shadow-md" style="width: 70px; height: 45px;">
                <svg viewBox="0 0 100 60" fill="none" xmlns="http://w3.org" class="w-full h-full">
                    <!-- Bingkai Diamond Hijau -->
                    <path d="M50 5 L92 30 L50 55 L8 30 Z" stroke="#16a34a" stroke-width="5" fill="none" />
                    <!-- Teks HSSI di Tengah -->
                    <text x="50%" y="60%" dominant-baseline="middle" text-anchor="middle" fill="#16a34a" font-family="Arial, sans-serif" font-weight="900" font-size="24">HSSI</text>
                </svg>
            </div>
            
            <!-- Teks Nama Perusahaan -->
            <div class="flex flex-col">
                <h1 class="text-lg md:text-xl font-black tracking-tight leading-tight uppercase">
                    PT HANWA STEEL SERVICE INDONESIA
                </h1>
                <p id="sync-status" class="text-[10px] text-emerald-300 font-bold tracking-[0.15em] uppercase">
                    SINKRON: 1:12:22 AM
                </p>
            </div>
        </div>
        
        <!-- Tombol Refresh -->
        <button onclick="fetchData()" id="refresh-btn" class="hidden md:flex items-center bg-emerald-600 hover:bg-emerald-500 px-5 py-2 rounded-full text-[11px] font-black transition-all active:scale-95 border border-emerald-400/50">
            <svg id="refresh-icon" class="mr-2" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"></path><path d="M21 3v5h-5"></path></svg>
            REFRESH DATA
        </button>
    </div>
</header>



    <main class="max-w-7xl mx-auto p-4 lg:p-8">
        <!-- Metrik Status -->
        <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
            <div class="bg-white p-6 rounded-3xl shadow-sm border-l-8 border-emerald-500 card-hover">
                <div class="text-[10px] font-black text-slate-400 uppercase mb-1">Total Plan</div>
                <div id="metric-total" class="text-3xl font-black text-slate-800">18</div>
            </div>
            <div class="bg-white p-6 rounded-3xl shadow-sm border-l-8 border-amber-400 card-hover">
                <div class="text-[10px] font-black text-slate-400 uppercase mb-1">Waiting</div>
                <div id="metric-wait" class="text-3xl font-black text-amber-500">8</div>
            </div>
            <div class="bg-white p-6 rounded-3xl shadow-sm border-l-8 border-blue-500 card-hover">
                <div class="text-[10px] font-black text-slate-400 uppercase mb-1">Running</div>
                <div id="metric-run" class="text-3xl font-black text-blue-600">10</div>
            </div>
            <div class="bg-white p-6 rounded-3xl shadow-sm border-l-8 border-slate-300 card-hover">
                <div class="text-[10px] font-black text-slate-400 uppercase mb-1">Finished</div>
                <div id="metric-done" class="text-3xl font-black text-slate-400">0</div>
            </div>
        </div>

        <!-- Tabel Monitoring -->
        <div class="bg-white rounded-[2rem] shadow-xl overflow-hidden border border-emerald-100">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="bg-emerald-50 text-emerald-800 border-b border-emerald-100">
                            <th class="px-6 py-4 text-[11px] font-black uppercase">Seq</th>
                            <th class="px-6 py-4 text-[11px] font-black uppercase">Product Information</th>
                            <th class="px-6 py-4 text-[11px] font-black uppercase">Customer Detail</th>
                            <th class="px-6 py-4 text-center text-[11px] font-black uppercase">Status</th>
                        </tr>
                    </thead>
                    <tbody id="table-body" class="divide-y divide-slate-100">
                        <!-- Contoh Row (Nanti akan diisi otomatis oleh JS kamu) -->
                        <tr class="hover:bg-emerald-50/30 transition-colors">
                            <td class="px-6 py-4 font-bold text-slate-400">1</td>
                            <td class="px-6 py-4">
                                <div class="font-extrabold text-slate-800">25-04464-00-00</div>
                                <div class="text-[11px] text-slate-500 uppercase">SPCC | 1.000 X 1219.00 X COIL | 6.79 KG</div>
                            </td>
                            <td class="px-6 py-4">
                                <div class="font-bold text-slate-700 text-sm">PT. SHINWA PACKAGE INDONESIA</div>
                                <div class="text-[10px] text-emerald-600 font-bold uppercase">DELIV: ASAP</div>
                            </td>
                            <td class="px-6 py-4 text-center">
                                <span class="px-3 py-1 bg-amber-100 text-amber-600 text-[10px] font-black rounded-full uppercase">Waiting</span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

</body>

    <script>
        const SHEET_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS5oxW4v4lVSiKmn8vUwaYIuzRDOoTCOhu0jB9zk6_WDM9ar1yAiPwrIZGUFvf3zXAqWcjnCaUyRKAu/pub?output=csv";

        let allData = [];

        async function fetchData() {
            const icon = document.getElementById('refresh-icon');
            const sync = document.getElementById('sync-status');
            icon.classList.add('refreshing');

            try {
                const response = await fetch(`${SHEET_CSV}&t=${Date.now()}`);
                const text = await response.text();
                
                const rows = text.split(/\r?\n/).map(row => {
                    return row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(p => p.replace(/^"|"$/g, '').trim());
                });

                const headerIdx = rows.findIndex(r => r.some(cell => cell.toUpperCase().includes("SEQ")));
                if (headerIdx === -1) throw new Error("Header SEQ tidak ditemukan");

                const headers = rows[headerIdx].map(h => h.toUpperCase());
                const colMap = {
                    seq: headers.findIndex(h => h.includes('SEQ')),
                    order: headers.findIndex(h => h.includes('ORDER NO')),
                    deliv: headers.findIndex(h => h.includes('DELIV')),
                    spec: headers.findIndex(h => h.includes('SPEC')),
                    size: headers.findIndex(h => h.includes('SIZE')),
                    weight: headers.findIndex(h => h.includes('WEIGHT')),
                    customer: headers.findIndex(h => h.includes('CUSTOMER')),
                    status: headers.findIndex(h => h.includes('NEXT'))
                };

                allData = rows.slice(headerIdx + 1)
                    .filter(r => r[colMap.seq] && !isNaN(parseInt(r[colMap.seq])))
                    .map(r => ({
                        seq: r[colMap.seq] || "-",
                        order: r[colMap.order] || "-",
                        deliv: r[colMap.deliv] || "-",
                        spec: r[colMap.spec] || "-",
                        size: r[colMap.size] || "-",
                        weight: r[colMap.weight] || "0",
                        customer: r[colMap.customer] || "N/A",
                        isRunning: r[colMap.status] && r[colMap.status].trim().length > 0
                    }));

                render();
                updateMetrics();
                sync.innerText = "SINKRON: " + new Date().toLocaleTimeString();

            } catch (e) {
                console.error(e);
                sync.innerText = "GAGAL SINKRONISASI";
            } finally {
                icon.classList.remove('refreshing');
            }
        }

        function render() {
            const container = document.getElementById('table-body');
            if (allData.length === 0) {
                container.innerHTML = `<tr><td class="p-24 text-center text-slate-400 font-bold uppercase tracking-widest">Data Tidak Ditemukan</td></tr>`;
                return;
            }

            container.innerHTML = allData.map(item => {
                const isRun = item.isRunning;
                const badgeStyle = isRun 
                    ? "bg-blue-50 text-blue-600 border-blue-100" 
                    : "bg-amber-50 text-amber-600 border-amber-100";

                return `
                    <tr class="group hover:bg-slate-50/80 transition-all border-b border-slate-50 last:border-0 grid grid-cols-12 px-8 py-5 items-center">
                        <td class="col-span-1">
                            <span class="text-2xl font-black text-slate-200 group-hover:text-indigo-200 italic transition-colors">${item.seq}</span>
                        </td>
                        <td class="col-span-5 pl-4">
                            <div class="font-extrabold text-slate-800 text-sm leading-none group-hover:text-indigo-600 transition-colors">${item.order}</div>
                            <div class="text-[10px] text-slate-400 font-bold uppercase mt-2.5 tracking-tight">
                                ${item.spec} <span class="mx-1 opacity-20">|</span> ${item.size} <span class="mx-1 opacity-20">|</span> ${item.weight} KG
                            </div>
                        </td>
                        <td class="col-span-4">
                            <div class="text-[11px] font-black text-slate-700 uppercase truncate pr-4">${item.customer}</div>
                            <div class="text-[9px] font-black text-indigo-400 uppercase italic mt-1">DELIV: ${item.deliv}</div>
                        </td>
                        <td class="col-span-2 text-right">
                            <span class="px-4 py-2 rounded-xl text-[9px] font-black border uppercase tracking-widest ${badgeStyle}">
                                ${isRun ? 'RUNNING' : 'WAITING'}
                            </span>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function updateMetrics() {
            document.getElementById('metric-total').innerText = allData.length;
            document.getElementById('metric-run').innerText = allData.filter(d => d.isRunning).length;
            document.getElementById('metric-wait').innerText = allData.filter(d => !d.isRunning).length;
            document.getElementById('metric-done').innerText = 0; 
        }

        window.onload = fetchData;
        setInterval(fetchData, 30000); 
    </script>
</body>
</html>
