<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SL1 Cloud Monitor</title>
    <!-- Tailwind CSS untuk Styling -->
    <script src="https://tailwindcss.com"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com"></script>
    <script src="https://unpkg.com"></script>
    <script src="https://unpkg.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com"></script>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        
        // Komponen StatBox Kecil
        const StatBox = ({ label, val, icon, color }) => (
            <div className={`${color} p-4 rounded-3xl text-white shadow-lg`}>
                <div className="flex items-center justify-between mb-2">
                    <span className="opacity-80 uppercase text-[10px] font-bold tracking-wider">{label}</span>
                    {icon}
                </div>
                <div className="text-2xl font-black">{val}</div>
            </div>
        );

        const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS5oxW4v4lVSiKmn8vUwaYIuzRDOoTCOhu0jB9zk6_WDM9ar1yAiPwrIZGUFvf3zXAqWcjnCaUyRKAu/pub?output=csv"; 

        function App() {
            const [data, setData] = useState([]);
            const [loading, setLoading] = useState(false);
            const [filter, setFilter] = useState('All');
            const [search, setSearch] = useState('');
            const [error, setError] = useState(null);
            const [lastSync, setLastSync] = useState(null);

            const fetchData = async () => {
                setLoading(true);
                setError(null);
                try {
                    const response = await fetch(`${SHEET_CSV_URL}&t=${new Date().getTime()}`);
                    if (!response.ok) throw new Error("Gagal mengambil data.");
                    const csvText = await response.text();
                    
                    // Simple CSV Parser
                    const lines = csvText.split('\n');
                    const headers = lines[0].split(',').map(h => h.trim().toUpperCase());
                    
                    const formattedData = lines.slice(1).map((line, i) => {
                        const cols = line.split(',');
                        return {
                            id: i,
                            orderNo: cols[1] || "N/A",
                            customer: cols[2] || "Unknown",
                            status: cols[7] || "Pending",
                        };
                    }).filter(item => item.orderNo !== "N/A");

                    setData(formattedData);
                    setLastSync(new Date().toLocaleTimeString());
                } catch (err) {
                    setError("Pastikan link Google Sheets benar dan sudah di-Publish as CSV.");
                } finally {
                    setLoading(false);
                }
            };

            useEffect(() => { fetchData(); }, []);

            const filteredData = data.filter(item => {
                const matchFilter = filter === 'All' || item.status.toLowerCase().includes(filter.toLowerCase());
                const matchSearch = item.orderNo.toLowerCase().includes(search.toLowerCase()) || 
                                    item.customer.toLowerCase().includes(search.toLowerCase());
                return matchFilter && matchSearch;
            });

            return (
                <div className="min-h-screen">
                    <header className="bg-slate-900 text-white p-4 shadow-xl">
                        <div className="max-w-7xl mx-auto flex justify-between items-center">
                            <h1 className="text-lg font-black tracking-tight uppercase">SL1 Cloud Monitor</h1>
                            <button onClick={fetchData} className="bg-indigo-600 px-4 py-2 rounded-xl text-xs font-bold">
                                {loading ? 'REFRESHING...' : 'REFRESH DATA'}
                            </button>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto p-6">
                        {error && <div className="bg-red-100 p-4 rounded-xl text-red-700 mb-4">{error}</div>}
                        
                        <div className="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
                            <StatBox label="Total Plan" val={data.length} color="bg-slate-800" />
                            <StatBox label="Waiting" val={data.filter(d=>d.status.includes('Wait')).length} color="bg-amber-500" />
                            <StatBox label="Running" val={data.filter(d=>d.status.includes('Run')).length} color="bg-blue-500" />
                            <StatBox label="Finished" val={data.filter(d=>d.status.includes('Finish')).length} color="bg-emerald-500" />
                        </div>

                        <div className="bg-white p-4 rounded-3xl shadow-sm border mb-6 flex flex-col md:flex-row gap-4">
                            <input 
                                type="text" 
                                placeholder="Cari Order No atau Customer..."
                                className="border p-3 rounded-2xl flex-1 outline-none focus:ring-2 ring-indigo-500"
                                onChange={(e) => setSearch(e.target.value)}
                            />
                            <select 
                                className="border p-3 rounded-2xl outline-none"
                                onChange={(e) => setFilter(e.target.value)}
                            >
                                <option value="All">Semua Status</option>
                                <option value="Wait">Waiting</option>
                                <option value="Run">Running</option>
                                <option value="Finish">Finished</option>
                            </select>
                        </div>

                        <div className="bg-white rounded-3xl shadow-sm overflow-hidden border">
                            <table className="w-full text-left">
                                <thead className="bg-slate-50 border-b">
                                    <tr>
                                        <th className="p-4 text-xs font-black uppercase text-slate-500">Order No</th>
                                        <th className="p-4 text-xs font-black uppercase text-slate-500">Customer</th>
                                        <th className="p-4 text-xs font-black uppercase text-slate-500">Status</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {filteredData.map(item => (
                                        <tr key={item.id} className="border-b hover:bg-slate-50">
                                            <td className="p-4 font-bold">{item.orderNo}</td>
                                            <td className="p-4">{item.customer}</td>
                                            <td className="p-4">
                                                <span className="px-3 py-1 rounded-full text-[10px] font-black bg-slate-100">
                                                    {item.status}
                                                </span>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
