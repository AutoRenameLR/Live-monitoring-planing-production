<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SL1 MONITOR</title>
    
    <!-- 1. Library Tailwind CSS yang BENAR -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 2. Google Fonts yang BENAR -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com" rel="stylesheet">
    
    <!-- 3. CSS Style yang dibungkus tag <style> -->
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
        }
        @keyframes spin-slow { 
            from { transform: rotate(0deg); } 
            to { transform: rotate(360deg); } 
        }
        .refreshing { 
            animation: spin-slow 1s linear infinite; 
        }
    </style>
</head>

<body class="bg-[#f8fafc] text-slate-900 min-h-screen">

    <!-- Header Dashboard Utama -->
    <header class="bg-[#0f172a] text-white p-4 sticky top-0 z-50 shadow-2xl border-b border-white/5">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-4">
                <div class="p-2.5 bg-indigo-600 rounded-2xl shadow-lg shadow-indigo-500/40">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
                </div>
                <div>
                    <h1 class="text-xl font-extrabold tracking-tight leading-none uppercase italic">SL1 MONITOR</h1>
                    <p id="sync-status" class="text-[10px] text-slate-400 font-bold tracking-[0.2em] mt-1 uppercase">SINKRONISASI DATABASE...</p>
                </div>
            </div>
            <button onclick="fetchData()" id="refresh-btn" class="group flex items-center bg-slate-800 hover:bg-indigo-600 px-5 py-2.5 rounded-2xl text-[11px] font-black transition-all active:scale-95 border border-slate-700">
                <svg id="refresh-icon" class="mr-2.5" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"></path><path d="M21 3v5h-5"></path></svg>
                <span id="btn-text" class="text-white">REFRESH DATA</span>
            </button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-4 lg:p-8">
        <!-- Dashboard Metrik -->
        <div class="grid grid-cols-2 lg:grid-cols-4 gap-6 mb-10">
            <div class="bg-white p-7 rounded-[2.5rem] border border-slate-200 shadow-sm">
                <div class="text-[11px] font-black text-slate-400 uppercase tracking-widest mb-2">Total Plan</div>
                <div id="metric-total" class="text-4xl font-black text-slate-800 tracking-tighter">0</div>
            </div>
            <div class="bg-white p-7 rounded-[2.5rem] border border-slate-200 shadow-sm text-amber-500">
                <div class="text-[11px] font-black uppercase tracking-widest mb-2 opacity-60">Waiting</div>
                <div id="metric-wait" class="text-4xl font-black tracking-tighter">0</div>
            </div>
            <div class="bg-white p-7 rounded-[2.5rem] border border-slate-200 shadow-sm text-blue-500">
                <div class="text-[11px] font-black uppercase tracking-widest mb-2 opacity-60">Running</div>
                <div id="metric-run" class="text-4xl font-black tracking-tighter">0</div>
            </div>
            <div class="bg-white p-7 rounded-[2.5rem] border border-slate-200 shadow-sm text-emerald-500">
                <div class="text-[11px] font-black uppercase tracking-widest mb-2 opacity-60">Finished</div>
                <div id="metric-done" class="text-4xl font-black tracking-tighter">0</div>
            </div>
        </div>

        <!-- Tabel Produksi dengan Header Kolom -->
        <div class="bg-white rounded-[3rem] shadow-sm border border-slate-200 overflow-hidden table-container flex flex-col">
            <!-- Header Kolom Monitor -->
            <div class="grid grid-cols-12 px-8 py-5 bg-slate-50 border-b border-slate-100">
                <div class="col-span-1 text-[10px] font-black text-slate-400 uppercase tracking-widest">Seq</div>
                <div class="col-span-5 text-[10px] font-black text-slate-400 uppercase tracking-widest pl-4">Product Detail (Order No / Spec / Size)</div>
                <div class="col-span-4 text-[10px] font-black text-slate-400 uppercase tracking-widest">Customer & Delivery</div>
                <div class="col-span-2 text-right text-[10px] font-black text-slate-400 uppercase tracking-widest">Status</div>
            </div>

            <div class="overflow-y-auto flex-1">
                <table class="w-full text-left border-collapse">
                    <tbody id="table-body" class="divide-y divide-slate-50">
                        <tr>
                            <td class="p-32 text-center text-slate-400 font-bold uppercase tracking-widest">Sinkronisasi Data...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        const SHEET_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS5oxW4v4lVSiKmn8vUwaYIuzRDOoTCOhu0jB9zk6_WDM9ar1yAiPwrIZGUFvf3zXAqWcjnCaUyRKAu/pub?output=csv";

        let allData = [];

        async function fetchData() {
            const icon = document.getElementById('refresh-icon');
            const sync = document.getElementById('sync-status');
            icon.classList.add('refreshing');

            try {
                const response = await fetch(`${SHEET_CSV}&t=${Date.now()}`);
                const text = await response.text();
                
                const rows = text.split(/\r?\n/).map(row => {
                    return row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(p => p.replace(/^"|"$/g, '').trim());
                });

                const headerIdx = rows.findIndex(r => r.some(cell => cell.toUpperCase().includes("SEQ")));
                if (headerIdx === -1) throw new Error("Header SEQ tidak ditemukan");

                const headers = rows[headerIdx].map(h => h.toUpperCase());
                const colMap = {
                    seq: headers.findIndex(h => h.includes('SEQ')),
                    order: headers.findIndex(h => h.includes('ORDER NO')),
                    deliv: headers.findIndex(h => h.includes('DELIV')),
                    spec: headers.findIndex(h => h.includes('SPEC')),
                    size: headers.findIndex(h => h.includes('SIZE')),
                    weight: headers.findIndex(h => h.includes('WEIGHT')),
                    customer: headers.findIndex(h => h.includes('CUSTOMER')),
                    status: headers.findIndex(h => h.includes('NEXT'))
                };

                allData = rows.slice(headerIdx + 1)
                    .filter(r => r[colMap.seq] && !isNaN(parseInt(r[colMap.seq])))
                    .map(r => ({
                        seq: r[colMap.seq] || "-",
                        order: r[colMap.order] || "-",
                        deliv: r[colMap.deliv] || "-",
                        spec: r[colMap.spec] || "-",
                        size: r[colMap.size] || "-",
                        weight: r[colMap.weight] || "0",
                        customer: r[colMap.customer] || "N/A",
                        isRunning: r[colMap.status] && r[colMap.status].trim().length > 0
                    }));

                render();
                updateMetrics();
                sync.innerText = "SINKRON: " + new Date().toLocaleTimeString();

            } catch (e) {
                console.error(e);
                sync.innerText = "GAGAL SINKRONISASI";
            } finally {
                icon.classList.remove('refreshing');
            }
        }

        function render() {
            const container = document.getElementById('table-body');
            if (allData.length === 0) {
                container.innerHTML = `<tr><td class="p-24 text-center text-slate-400 font-bold uppercase tracking-widest">Data Tidak Ditemukan</td></tr>`;
                return;
            }

            container.innerHTML = allData.map(item => {
                const isRun = item.isRunning;
                const badgeStyle = isRun 
                    ? "bg-blue-50 text-blue-600 border-blue-100" 
                    : "bg-amber-50 text-amber-600 border-amber-100";

                return `
                    <tr class="group hover:bg-slate-50/80 transition-all border-b border-slate-50 last:border-0 grid grid-cols-12 px-8 py-5 items-center">
                        <td class="col-span-1">
                            <span class="text-2xl font-black text-slate-200 group-hover:text-indigo-200 italic transition-colors">${item.seq}</span>
                        </td>
                        <td class="col-span-5 pl-4">
                            <div class="font-extrabold text-slate-800 text-sm leading-none group-hover:text-indigo-600 transition-colors">${item.order}</div>
                            <div class="text-[10px] text-slate-400 font-bold uppercase mt-2.5 tracking-tight">
                                ${item.spec} <span class="mx-1 opacity-20">|</span> ${item.size} <span class="mx-1 opacity-20">|</span> ${item.weight} KG
                            </div>
                        </td>
                        <td class="col-span-4">
                            <div class="text-[11px] font-black text-slate-700 uppercase truncate pr-4">${item.customer}</div>
                            <div class="text-[9px] font-black text-indigo-400 uppercase italic mt-1">DELIV: ${item.deliv}</div>
                        </td>
                        <td class="col-span-2 text-right">
                            <span class="px-4 py-2 rounded-xl text-[9px] font-black border uppercase tracking-widest ${badgeStyle}">
                                ${isRun ? 'RUNNING' : 'WAITING'}
                            </span>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function updateMetrics() {
            document.getElementById('metric-total').innerText = allData.length;
            document.getElementById('metric-run').innerText = allData.filter(d => d.isRunning).length;
            document.getElementById('metric-wait').innerText = allData.filter(d => !d.isRunning).length;
            document.getElementById('metric-done').innerText = 0; 
        }

        window.onload = fetchData;
        setInterval(fetchData, 30000); 
    </script>
</body>
</html>
